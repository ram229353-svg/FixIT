<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - FixIT</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .admin-login { max-width: 400px; margin: 100px auto; text-align: center; }
    .admin-login input { width: 100%; padding: 12px; margin: 10px 0; }
    .admin-login button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; cursor: pointer; }
    .dashboard { display: none; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 20px 0; }
    .stat-card { background: #f8f9fa; padding: 20px; border-radius: 8px; text-align: center; }
    .stat-card h3 { margin: 0; color: #666; font-size: 14px; }
    .stat-card .count { font-size: 32px; font-weight: bold; color: #2c3e50; }
    .booking-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .booking-table th, .booking-table td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    .booking-table th { background: #2c3e50; color: white; }
    .status-pending { color: orange; font-weight: bold; }
    .status-approved { color: green; font-weight: bold; }
    .status-rejected { color: red; font-weight: bold; }
    .action-btn { padding: 6px 12px; margin: 2px; border: none; border-radius: 4px; cursor: pointer; }
    .approve-btn { background: #27ae60; color: white; }
    .reject-btn { background: #e74c3c; color: white; }
    .delete-btn { background: #dc3545; color: white; padding: 4px 8px; font-size: 12px; }
    .logout-btn { background: #95a5a6; color: white; }
    .filter-tabs { margin: 20px 0; }
    .filter-tabs button { padding: 10px 20px; margin-right: 10px; border: 1px solid #ddd; background: white; cursor: pointer; }
    .filter-tabs button.active { background: #2c3e50; color: white; }
  </style>
</head>
<body>

<div id="adminLogin" class="admin-login">
  <h2>🔐 Admin Login</h2>
  <input type="text" id="adminUsername" placeholder="Admin Username">
  <input type="password" id="adminPassword" placeholder="Admin Password">
  <button onclick="adminLogin()">Login</button>
  <p><a href="index.html">← Back to Home</a></p>
</div>

<div id="adminDashboard" class="admin-container dashboard">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h1>📊 Admin Dashboard</h1>
    <button class="action-btn logout-btn" onclick="adminLogout()">Logout</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <h3>Total Bookings</h3>
      <div class="count" id="totalBookings">0</div>
    </div>
    <div class="stat-card">
      <h3>Pending</h3>
      <div class="count" id="pendingBookings">0</div>
    </div>
    <div class="stat-card">
      <h3>Approved</h3>
      <div class="count" id="approvedBookings">0</div>
    </div>
    <div class="stat-card">
      <h3>Rejected</h3>
      <div class="count" id="rejectedBookings">0</div>
    </div>
  </div>

  <div class="filter-tabs">
    <button class="active" onclick="filterBookings('all')">All</button>
    <button onclick="filterBookings('pending')">Pending</button>
    <button onclick="filterBookings('approved')">Approved</button>
    <button onclick="filterBookings('rejected')">Rejected</button>
  </div>

  <table class="booking-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Customer</th>
        <th>Service</th>
        <th>Phone</th>
        <th>Time</th>
        <th>Problem</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="bookingsTable"></tbody>
  </table>
</div>

<script>
  // Admin credentials
  const ADMIN_USER = "admin";
  const ADMIN_PASS = "admin123";

  function adminLogin() {
    const user = document.getElementById("adminUsername").value;
    const pass = document.getElementById("adminPassword").value;

    if (user === ADMIN_USER && pass === ADMIN_PASS) {
      sessionStorage.setItem("isAdmin", "true");
      showDashboard();
    } else {
      alert("Invalid admin credentials");
    }
  }

  function adminLogout() {
    sessionStorage.removeItem("isAdmin");
    window.location.href = "index.html";
  }

  function showDashboard() {
    document.getElementById("adminLogin").style.display = "none";
    document.getElementById("adminDashboard").style.display = "block";
    loadBookings();
  }

  function loadBookings(filter = "all") {
    const bookings = JSON.parse(localStorage.getItem("bookings") || "[]");
    const tbody = document.getElementById("bookingsTable");
    
    // Update stats
    document.getElementById("totalBookings").textContent = bookings.length;
    document.getElementById("pendingBookings").textContent = bookings.filter(b => b.status === "pending").length;
    document.getElementById("approvedBookings").textContent = bookings.filter(b => b.status === "approved").length;
    document.getElementById("rejectedBookings").textContent = bookings.filter(b => b.status === "rejected").length;

    // Filter bookings
    let filtered = bookings;
    if (filter !== "all") {
      filtered = bookings.filter(b => b.status === filter);
    }

    // Render table
    tbody.innerHTML = filtered.map(booking => `
      <tr>
        <td>${booking.id}</td>
        <td>${booking.customerName}</td>
        <td>${capitalizeFirst(booking.serviceType)}</td>
        <td>${booking.customerPhone}</td>
        <td>${booking.bookingTime || "N/A"}</td>
        <td>${booking.notes || "No problem described"}</td>
        <td class="status-${booking.status}">${capitalizeFirst(booking.status)}</td>
        <td>
          <button class="action-btn delete-btn" onclick="deleteBooking(${booking.id})">✗</button>
          ${booking.status === "pending" ? `
            <button class="action-btn approve-btn" onclick="updateStatus(${booking.id}, 'approved')">✓ Approve</button>
            <button class="action-btn reject-btn" onclick="updateStatus(${booking.id}, 'rejected')">✗ Reject</button>
          ` : ''}
        </td>
      </tr>
    `).join("");
  }

  function deleteBooking(bookingId) {
    if(confirm("Are you sure you want to delete this booking?")) {
      let bookings = JSON.parse(localStorage.getItem("bookings") || "[]");
      bookings = bookings.filter(b => b.id !== bookingId);
      localStorage.setItem("bookings", JSON.stringify(bookings));
      loadBookings();
    }
  }

  function updateStatus(bookingId, newStatus) {
    let bookings = JSON.parse(localStorage.getItem("bookings") || "[]");
    const index = bookings.findIndex(b => b.id === bookingId);
    
    if (index !== -1) {
      bookings[index].status = newStatus;
      bookings[index].updatedAt = new Date().toISOString();
      localStorage.setItem("bookings", JSON.stringify(bookings));
      loadBookings();
    }
  }

  function filterBookings(filter) {
    // Update active button
    document.querySelectorAll(".filter-tabs button").forEach(btn => {
      btn.classList.remove("active");
      if (btn.textContent.toLowerCase().includes(filter)) {
        btn.classList.add("active");
      }
    });
    loadBookings(filter);
  }

  function capitalizeFirst(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  // Check if already logged in
  if (sessionStorage.getItem("isAdmin") === "true") {
    showDashboard();
  }
</script>

</body>
</html>
