# Render Static Site Configuration
# Deploy this project as a static site on render.com

services:
  - type: static
    name: fixit-app
    buildCommand: ""
    publishDir: "."
    headers:
      - name: "Cache-Control"
        value: "public, max-age=3600"
      - name: "X-Content-Type-Options"
        value: "nosniff"
      - name: "X-Frame-Options"
        value: "DENY"